  <body>
    <header class="text-white text-center py-4">
      <h1>ผลงานของเรา</h1>
    </header>

    <!-- Add Gallery Item Button -->
    <div class="container mt-5">
      <button
        type="button"
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#addGalleryItemModal"
        onclick="resetForm()"
      >
        เพิ่มผลงานใหม่
      </button>
    </div>

    <!-- Modal for Adding/Editing Gallery Item -->
    <div
      class="modal fade"
      id="addGalleryItemModal"
      tabindex="-1"
      aria-labelledby="addGalleryItemModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addGalleryItemModalLabel">
              เพิ่มผลงานใหม่
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="gallery-item-form" enctype="multipart/form-data">
              <input type="hidden" id="gallery-item-id" />
              <div class="mb-3">
                <label for="title" class="form-label">ชื่อผลงาน</label>
                <input type="text" class="form-control" id="title" required />
              </div>
              <div class="mb-3">
                <label for="description" class="form-label">คำอธิบาย</label>
                <textarea
                  class="form-control"
                  id="description"
                  rows="3"
                  required
                ></textarea>
              </div>
              <div class="mb-3">
                <label for="image" class="form-label">เลือกรูปภาพ</label>
                <input
                  type="file"
                  class="form-control"
                  id="image"
                  accept="image/*"
                />
              </div>
              <button type="submit" class="btn btn-primary">บันทึกผลงาน</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="album py-4 bg-body-tertiary" style="margin-top: 30px">
      <section class="container mt-5" id="gallery-container">
        <div class="row" id="gallery-items"></div>
      </section>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        async function fetchGalleryItems() {
          try {
            const response = await fetch("http://localhost:5001/api/gallery"); //call API

            if (!response.ok) throw new Error("Network response was not ok");
            const galleryItems = await response.json();
            displayGalleryItems(galleryItems);
          } catch (error) {
            console.error("Error fetching gallery items:", error);
          }
        }
        //
        function displayGalleryItems(galleryItems) {
          const galleryItemsContainer =
            document.getElementById("gallery-items");
          galleryItemsContainer.innerHTML = "";
          galleryItems.reverse();
          galleryItems.forEach((item) => {
            const card = document.createElement("div");
            card.classList.add("col-md-4", "mb-4");
            card.innerHTML = `
            <div class="card h-100 shadow-sm">
              <img src="http://localhost:5001/${item.img}" class="card-img-top" style="height: 200px" alt="${item.title}" />
              <div class="card-body">
                <h5 class="card-title text-primary">${item.title}</h5>
                <p class="card-text">${item.description}</p>
                <button onclick="editGalleryItem('${item._id}')" class="btn btn-warning btn-sm">แก้ไข</button>
                <button onclick="deleteGalleryItem('${item._id}')" class="btn btn-danger btn-sm">ลบ</button>
              </div>
            </div>`;
            galleryItemsContainer.appendChild(card);
          });
        }

        async function addGalleryItem(event) {
          event.preventDefault();
          const itemId = document.getElementById("gallery-item-id").value;
          const title = document.getElementById("title").value;
          const description = document.getElementById("description").value;
          const imageFile = document.getElementById("image").files[0];

          const formData = new FormData();
          formData.append("title", title);
          formData.append("description", description);
          if (imageFile) formData.append("img", imageFile);

          const method = itemId ? "PUT" : "POST";
          const url = itemId
            ? `http://localhost:5001/api/gallery/${itemId}`
            : "http://localhost:5001/api/gallery";

          try {
            const response = await fetch(url, {
              method: method,
              body: formData,
            });
            if (!response.ok) throw new Error("Failed to save gallery item");
            fetchGalleryItems();
            resetForm();
            const modal = bootstrap.Modal.getInstance(
              document.getElementById("addGalleryItemModal")
            );
            modal.hide();
          } catch (error) {
            console.error("Error adding/updating gallery item:", error);
          }
        }

        window.editGalleryItem = async function (id) {
          try {
            const response = await fetch(
              `http://localhost:5001/api/gallery/${id}`
            );
            if (!response.ok) throw new Error("Failed to fetch gallery item");

            const item = await response.json();
            document.getElementById("gallery-item-id").value = item._id;
            document.getElementById("title").value = item.title;
            document.getElementById("description").value = item.description;

            const modal = new bootstrap.Modal(
              document.getElementById("addGalleryItemModal")
            );
            modal.show();
          } catch (error) {
            console.error("Error editing gallery item:", error);
          }
        };

        window.deleteGalleryItem = async function (id) {
          if (!confirm("คุณต้องการลบโปรโมชั่นนี้หรือไม่?")) return;

          try {
            const response = await fetch(
              `http://localhost:5001/api/gallery/${id}`,
              { method: "DELETE" }
            );
            if (!response.ok) throw new Error("Failed to delete gallery item");
            fetchGalleryItems();
          } catch (error) {
            console.error("Error deleting gallery item:", error);
          }
        };

        function resetForm() {
          document.getElementById("gallery-item-id").value = "";
          document.getElementById("title").value = "";
          document.getElementById("description").value = "";
          document.getElementById("image").value = "";
        }
        document
          .getElementById("gallery-item-form")
          .addEventListener("submit", addGalleryItem);
        fetchGalleryItems();
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
